# PauseAndFlourish.com — Weekly Content Pipeline
# Runs every Monday at 16:00 UTC, plus manual trigger.
# Contains the link/image health check and the conditional Creators API price sync.

name: Weekly Content

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch: {}

jobs:
  weekly-content:
    name: Weekly Link Check & Price Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Link and image health check
        run: |
          node scripts/check-links.js
          BROKEN=$(python3 -c "import json; d=json.load(open('link-report.json')); print(d['summary'].get('BROKEN', 0))")
          echo "BROKEN count: ${BROKEN}"
          if [ "$BROKEN" -gt 0 ]; then
            echo "::error::Link checker found ${BROKEN} BROKEN link(s)/image(s). See link-report.json."
            exit 1
          fi
          echo "No BROKEN links. INCONCLUSIVE results (e.g. Amazon bot-blocks) do not fail the job."

      - name: Creators API price sync
        env:
          CREATORS_CREDENTIAL_ID: ${{ secrets.CREATORS_CREDENTIAL_ID }}
          CREATORS_CREDENTIAL_SECRET: ${{ secrets.CREATORS_CREDENTIAL_SECRET }}
          PAAPI_PARTNER_TAG: ${{ secrets.PAAPI_PARTNER_TAG }}
        run: |
          if [ -n "$CREATORS_CREDENTIAL_ID" ]; then
            echo "Creators API credentials present - running live price sync."
            node scripts/fetch-prices.js
          else
            echo "Creators API credentials not configured - running dry-run price sync with mock fixture."
            node scripts/fetch-prices.js --dry-run
          fi
