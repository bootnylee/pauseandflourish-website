# PauseAndFlourish.com — Netlify Configuration

[build]
  command = "pnpm install && node scripts/generate-sitemap.mjs && npx tsx scripts/extract-data.ts && pnpm build && node scripts/prerender.mjs"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# ── Domain normalization: www → non-www (301) ────────────────────────────────
[[redirects]]
  from = "https://www.pauseandflourish.com/*"
  to   = "https://pauseandflourish.com/:splat"
  status = 301
  force  = true

# ── SPA routing — serve prerendered HTML for all routes ─────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache sitemap for 1 day ───────────────────────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Cache robots.txt for 1 week ───────────────────────────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=604800"

